<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>صفحة المتجر</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
  :root {
    --primary: #B78728;
    --bg-dark: #1a120a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Tajawal', sans-serif;
    color: #fff;
  }
  body {
    background:
      radial-gradient(circle at 20% 0%, color-mix(in srgb, var(--primary) 35%, transparent), transparent 45%),
      radial-gradient(circle at 80% 10%, color-mix(in srgb, var(--primary) 25%, transparent), transparent 40%),
      linear-gradient(180deg, #120c07 0%, #0d0906 100%);
    display: flex;
    justify-content: center;
    padding: 40px 16px 30px;
  }
  .wrap {
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  /* Decorations */
  .deco-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    height: 60px;
    margin-bottom: 4px;
    font-size: 34px;
    opacity: 0.9;
  }
  .deco-row span { filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4)); }
  .deco-center-star {
    font-size: 16px;
    color: var(--primary);
    align-self: center;
    flex: 1;
    text-align: center;
  }

  .logo-wrap { margin: 10px auto 14px; }
  .logo-circle {
    width: 96px; height: 96px;
    border-radius: 50%;
    margin: 0 auto;
    background: color-mix(in srgb, var(--primary) 20%, #1a120a);
    border: 2px solid color-mix(in srgb, var(--primary) 60%, transparent);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
  .logo-circle i { font-size: 34px; color: var(--primary); }

  .store-title {
    font-family: 'Aref Ruqaa', 'Tajawal', serif;
    font-size: 34px;
    font-weight: 700;
    color: var(--primary);
    margin: 8px 0 2px;
    line-height: 1.3;
  }
  .store-subtitle {
    font-size: 13px;
    letter-spacing: 4px;
    color: #cfc3b0;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .divider {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    color: var(--primary);
    font-size: 13px;
    margin: 18px 0;
    opacity: 0.85;
  }
  .divider::before, .divider::after {
    content: "";
    height: 1px;
    flex: 1;
    background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--primary) 50%, transparent), transparent);
    max-width: 90px;
  }

  .greeting {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .message {
    font-size: 13.5px;
    color: #d8cdbb;
    margin-bottom: 26px;
    line-height: 1.6;
  }

  .links-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .link-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 14px 18px;
    text-decoration: none;
    color: #fff;
    transition: transform .15s ease, background .15s ease;
  }
  .link-card:active { transform: scale(0.98); }
  .link-card:hover { background: rgba(255,255,255,0.07); }

  .link-external {
    font-size: 13px;
    color: #8a7f6f;
  }
  .link-text { flex: 1; text-align: right; }
  .link-title { font-size: 15.5px; font-weight: 700; }
  .link-subtitle { font-size: 12px; color: #a99c86; margin-top: 2px; }

  .link-icon {
    width: 46px; height: 46px;
    min-width: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
    color: #fff;
  }

  .divider-bottom {
    margin-top: 34px;
  }

  .footer {
    margin-top: 20px;
    font-size: 12px;
    color: #7d7263;
  }

  .state-card {
    color: #cfc3b0;
    font-size: 14px;
    padding: 60px 20px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

  <div class="wrap">
    <div id="loading-state" class="state-card">
      <i class="fas fa-circle-notch fa-spin"></i> جاري التحميل...
    </div>

    <div id="notfound-state" class="state-card hidden">
      <i class="fas fa-exclamation-triangle" style="font-size:26px; margin-bottom:10px; display:block;"></i>
      هذه الصفحة غير متاحة حالياً
    </div>

    <div id="page-content" class="hidden">
      <div class="deco-row" id="deco-row"></div>

      <div class="logo-wrap">
        <div class="logo-circle" id="logo-circle">
          <i class="fas fa-store"></i>
        </div>
      </div>

      <div class="store-title" id="store-title"></div>
      <div class="store-subtitle" id="store-subtitle"></div>

      <div class="divider" id="greeting-divider"></div>
      <div class="greeting hidden" id="store-greeting"></div>
      <div class="message hidden" id="store-message"></div>

      <div class="links-list" id="links-list"></div>

      <div class="divider divider-bottom"></div>
      <div class="footer" id="footer-text"></div>
    </div>
  </div>

<script>
  const slug = window.location.pathname.split("/").pop();
  const isPreview = window.self !== window.top; // داخل iframe المعاينة بالأدمن

  const decoIcons = {
    ramadan: ["🏮", "⭐", "🏮"],
    eid: ["🌙", "✨", "🌙"],
    none: ["", "", ""],
  };

  function renderDecoRow(theme) {
    const icons = decoIcons[theme] || decoIcons.none;
    const row = document.getElementById("deco-row");
    if (theme === "none") { row.style.display = "none"; return; }
    row.style.display = "flex";
    row.innerHTML = `<span>${icons[0]}</span><span class="deco-center-star">${icons[1]}</span><span>${icons[2]}</span>`;
  }

  function iconBadgeColor(hex) {
    return hex || "var(--primary)";
  }

  function render(data) {
    document.documentElement.style.setProperty("--primary", data.primaryColor || "#B78728");

    renderDecoRow(data.occasionTheme || "none");

    const logoCircle = document.getElementById("logo-circle");
    if (data.logo) {
      logoCircle.innerHTML = `<img src="${data.logo}" alt="logo">`;
    } else {
      logoCircle.innerHTML = `<i class="fas fa-store"></i>`;
    }

    document.getElementById("store-title").innerText = data.title || data.restaurantName || "";
    document.getElementById("store-subtitle").innerText = data.subtitle || "";
    document.getElementById("store-subtitle").style.display = data.subtitle ? "block" : "none";

    const greetingEl = document.getElementById("store-greeting");
    const messageEl = document.getElementById("store-message");
    const greetingDivider = document.getElementById("greeting-divider");

    if (data.greeting) {
      greetingEl.innerText = data.greeting;
      greetingEl.classList.remove("hidden");
      greetingDivider.classList.remove("hidden");
    } else {
      greetingEl.classList.add("hidden");
      greetingDivider.classList.add("hidden");
    }

    if (data.message) {
      messageEl.innerText = data.message;
      messageEl.classList.remove("hidden");
    } else {
      messageEl.classList.add("hidden");
    }

    const list = document.getElementById("links-list");
    list.innerHTML = "";
    (data.links || []).forEach((link) => {
      const a = document.createElement("a");
      a.className = "link-card";
      a.href = link.url || "#";
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.innerHTML = `
        <span class="link-external"><i class="fas fa-arrow-up-left-from-circle"></i></span>
        <span class="link-text">
          <div class="link-title">${link.title || ""}</div>
          ${link.subtitle ? `<div class="link-subtitle">${link.subtitle}</div>` : ""}
        </span>
        <span class="link-icon" style="background:${iconBadgeColor(link.color)}">
          <i class="${link.icon || "fas fa-link"}"></i>
        </span>
      `;
      list.appendChild(a);
    });

    document.getElementById("footer-text").innerText = `© ${new Date().getFullYear()} ${data.title || data.restaurantName || ""}`;

    document.getElementById("loading-state").classList.add("hidden");
    document.getElementById("notfound-state").classList.add("hidden");
    document.getElementById("page-content").classList.remove("hidden");
  }

  function showNotFound() {
    document.getElementById("loading-state").classList.add("hidden");
    document.getElementById("page-content").classList.add("hidden");
    document.getElementById("notfound-state").classList.remove("hidden");
  }

  async function init() {
    if (!slug || slug === "store") return showNotFound();
    try {
      const res = await fetch(`/api/v1/store-page/${slug}`);
      const data = await res.json();
      if (data.status !== "success") {
        if (isPreview) return; // في المعاينة ننتظر postMessage بدل ما نظهر خطأ
        return showNotFound();
      }
      render(data.data);
    } catch (e) {
      if (!isPreview) showNotFound();
    }
  }

  // استقبال تحديث حي من لوحة تحكم الأدمن (المعاينة المباشرة)
  window.addEventListener("message", (event) => {
    if (event.data && event.data.type === "UPDATE_STORE_PAGE") {
      render(event.data.config);
    }
  });

  init();
</script>
</body>
</html>
